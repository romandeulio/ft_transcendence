server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    # SSL certificates
    ssl_certificate     /etc/ssl/certs/transcendence.crt;
    ssl_certificate_key /etc/ssl/private/transcendence.key;
    ssl_protocols       TLSv1.2 TLSv1.3;


    #security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    #add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://cdn.intra.42.fr; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss://$host ws://$host wss://localhost wss://localhost:5173; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Content-Security-Policy "
    default-src 'self';
    script-src  'self' 'unsafe-inline';
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src     'self' data: blob: https://cdn.intra.42.fr;
    font-src    'self' https://fonts.gstatic.com;
    connect-src 'self' wss://localhost wss://localhost:5173;
    frame-ancestors 'none';
    object-src  'none';
    base-uri    'self';
    form-action 'self';
    " always;
    # 'unsafe-inline' required for Vite HMR injected scripts in dev mode.

    # WebSockets
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # REST API → Django
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Frontend React
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location /media/ {
        alias /app/media/;
    }
}
