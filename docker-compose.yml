name: transcendence

services:
  postgresql:
    image: postgres:15
    container_name: transcendence_postgresql
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s

  redis:
    image: redis:7-alpine
    container_name: transcendence_redis
    restart: unless-stopped
    networks:
      - backend_net

  backup:
    build: ./backup
    container_name: transcendence_backup
    env_file:
      - .env
    volumes:
      - backup_data:/backups
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - backend_net

  backend:
    build: ./backend
    container_name: transcendence_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./media:/app/media 
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend_net
      - frontend_net

  frontend:
    build: ./frontend
    container_name: transcendence_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - frontend_net

  nginx:
    build: ./nginx
    container_name: transcendence_nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/app/media
    depends_on:
      - backend
      - frontend
    networks:
      - frontend_net

volumes:
  postgres_data:
  backup_data:

networks:
  backend_net:
  frontend_net: